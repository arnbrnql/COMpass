<dialog class="modal modal-open">
  <div class="modal-box">
    <h3 class="font-bold text-lg">Unlock New Persona</h3>
    <form [formGroup]="unlockForm" (ngSubmit)="onSubmit()">
      <p class="py-4">You're about to unlock the {{ unlockForm.get('roleToUnlock')?.value }} role. Please provide some additional details.</p>

      @if (unlockForm.get('roleToUnlock')?.value === 'mentor') {
        <div class="form-control">
          <label class="label"><span class="label-text">Bio</span></label>
          <textarea formControlName="bio" class="textarea textarea-bordered" placeholder="A brief introduction about yourself"></textarea>
        </div>
        <div class="form-control mt-4">
          <label class="label"><span class="label-text">Expertise (comma-separated)</span></label>
          <input type="text" formControlName="expertise" class="input input-bordered" placeholder="e.g., Angular, Leadership">
        </div>
      } @else {
        <div class="form-control">
          <label class="label"><span class="label-text">Learning Goals (comma-separated)</span></label>
          <input type="text" formControlName="goals" class="input input-bordered" placeholder="e.g., Career Growth, Public Speaking">
        </div>
      }

      <div class="modal-action">
        <button type="button" class="btn" (click)="close.emit()">Cancel</button>
        <button type="submit" class="btn btn-primary" [disabled]="isSubmitting()">
          @if (isSubmitting()) {
            <span class="loading loading-spinner"></span>
          }
          Unlock
        </button>
      </div>
    </form>
  </div>
</dialog>
