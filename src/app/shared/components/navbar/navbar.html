<div class="navbar bg-base-100 shadow-md">
  <div class="navbar-start">
    <a routerLink="/" class="btn btn-ghost text-xl">Compass</a>
  </div>

  <div class="navbar-center">
    @if (roleService.canSwitchRoles()) {
      <div class="dropdown">
        <div tabindex="0" role="button" class="btn btn-ghost">
          <span>
            Act as: <span class="font-bold capitalize">{{ roleService.activeRole() }}</span>
          </span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 ml-1"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path
              fill-rule="evenodd"
              d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
              clip-rule="evenodd"
            />
          </svg>
        </div>
        <ul tabindex="0" class="dropdown-content menu p-2 shadow bg-base-100 rounded-box w-52 z-50">
          <li><a (click)="setRole('mentee')" [class.active]="roleService.activeRole() === 'mentee'">Mentee</a></li>
          <li><a (click)="setRole('mentor')" [class.active]="roleService.activeRole() === 'mentor'">Mentor</a></li>
        </ul>
      </div>
    }
  </div>

  <div class="navbar-end">
    @if (authService.isAuthenticated()) {
      <div class="dropdown dropdown-end">
        <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
          <div class="w-10 rounded-full">
            <img
              alt="User Avatar"
              [src]="authService.currentUser()?.photoURL || 'assets/images/default-avatar.png'"
            />
          </div>
        </div>
        <ul tabindex="0" class="menu menu-sm dropdown-content mt-3 z-[1] p-2 shadow bg-base-100 rounded-box w-52">
          <li>
            <a routerLink="/profile" class="justify-between">
              Profile
              <span class="badge">New</span>
            </a>
          </li>
          <li><a>Settings</a></li>
          <li><a (click)="logout()">Logout</a></li>
        </ul>
      </div>
    } @else {
      <a routerLink="/auth/login" class="btn btn-ghost">Log In</a>
      <a routerLink="/auth/register" class="btn btn-primary ml-2">Sign Up</a>
    }
  </div>
</div>
