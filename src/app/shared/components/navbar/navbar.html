<div class="navbar bg-base-100 shadow-md">
  <div class="navbar-start">
    <a routerLink="/" class="btn btn-ghost text-xl">Compass</a>
  </div>

  <div class="navbar-center">
    @if (roleService.canSwitchRoles()) {
      <div class="form-control">
        <label class="label cursor-pointer gap-4">
          <span class="label-text">Act as {{ roleService.activeRole() === 'mentor' ? 'Mentee' : 'Mentor' }}</span>
          <input
            type="checkbox"
            class="toggle toggle-primary"
            [checked]="roleService.activeRole() === 'mentor'"
            (change)="roleService.toggleRole()"
          />
        </label>
      </div>
    }
  </div>

  <div class="navbar-end">
    @if (authService.isAuthenticated()) {
      <div class="dropdown dropdown-end">
        <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
          <div class="w-10 rounded-full">
            <img
              alt="User Avatar"
              [src]="authService.currentUser()?.photoURL || 'assets/images/default-avatar.png'"
            />
          </div>
        </div>
        <ul tabindex="0" class="menu menu-sm dropdown-content mt-3 z-[1] p-2 shadow bg-base-100 rounded-box w-52">
          <li>
            <a routerLink="/profile/edit" class="justify-between">
              Profile
              <span class="badge">New</span>
            </a>
          </li>
          <li><a>Settings</a></li>
          <li><a (click)="logout()">Logout</a></li>
        </ul>
      </div>
    } @else {
      <a routerLink="/auth/login" class="btn btn-ghost">Log In</a>
      <a routerLink="/auth/register" class="btn btn-primary ml-2">Sign Up</a>
    }
  </div>
</div>
