<div class="flex items-center justify-center min-h-screen bg-base-200">
  <div class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body">
      <h2 class="card-title justify-center text-2xl font-bold mb-2">Welcome Back</h2>
      <p class="text-center text-base-content/70 mb-4">Sign in to continue to COMpass</p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="label">
            <span class="label-text">Email</span>
          </label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="Enter your email"
            class="input input-bordered w-full"
            [class.input-error]="form.get('email')?.invalid && form.get('email')?.touched"
          />
        </div>

        <div>
          <label class="label">
            <span class="label-text">Password</span>
          </label>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="Enter your password"
            class="input input-bordered w-full"
            [class.input-error]="form.get('password')?.invalid && form.get('password')?.touched"
          />
        </div>

        @if (errorMessage()) {
          <div class="alert alert-error text-sm">
            <span>{{ errorMessage() }}</span>
          </div>
        }

        <div class="card-actions justify-center">
          <button type="submit" class="btn btn-primary w-full" [disabled]="isLoading() || form.invalid">
            @if (isLoading()) {
              <span class="loading loading-spinner"></span>
            }
            Log In
          </button>
        </div>
      </form>

      <div class="divider">Don't have an account?</div>

      <a routerLink="/auth/register" class="btn btn-outline w-full">
        Create Account
      </a>
    </div>
  </div>
</div>
