<div class="container">
  <h2>Edit Your Profile</h2>

  @if (currentUser()) {
  <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="displayName">Display Name</label>
      <input id="displayName" type="text" formControlName="displayName" />
    </div>

    <div class="form-group">
      <label for="bio">Bio</label>
      <textarea id="bio" formControlName="bio"></textarea>
    </div>

    <div class="form-group">
      <label for="location">Location</label>
      <input id="location" type="text" formControlName="location" />
    </div>

    <div class="form-group">
      <label for="skills">Skills (comma-separated)</label>
      <input id="skills" type="text" formControlName="skills" />
    </div>

    <div class="form-group">
      <label for="interests">Interests (comma-separated)</label>
      <input id="interests" type="text" formControlName="interests" />
    </div>

    <div class="form-group">
      <label for="goals">Mentorship Goals</label>
      <textarea id="goals" formControlName="goals"></textarea>
    </div>

    <button type="submit" [disabled]="isLoading() || profileForm.invalid">
      @if (isLoading()) {
      <span>Saving...</span>
      } @else {
      <span>Save Profile</span>
      }
    </button>

    @if (statusMessage(); as message) {
    <p class="status-message">{{ message }}</p>
    }
  </form>
  } @else {
  <p>Loading your profile...</p>
  }
</div>
