<div class="modal" [class.modal-open]="isModalOpen()">
  <div class="modal-box">
    <h3 class="font-bold text-2xl">Send Mentorship Request</h3>
    <p class="py-4">Write a short message to your potential mentor explaining what you'd like to achieve.</p>
    <form [formGroup]="requestForm" (ngSubmit)="onSubmit()">
      <textarea
        formControlName="message"
        class="textarea textarea-bordered w-full h-32"
        placeholder="Hi! I'm interested in your expertise in..."
      ></textarea>
      @if (errorMessage()) {
        <div class="alert alert-error text-sm mt-4">
          <span>{{ errorMessage() }}</span>
        </div>
      }
      <div class="modal-action">
        <button type="button" class="btn btn-ghost" (click)="close()">Cancel</button>
        <button type="submit" class="btn btn-primary" [disabled]="isSubmitting()">
           @if(isSubmitting()) { <span class="loading loading-spinner"></span> }
          Send Request
        </button>
      </div>
    </form>
  </div>
</div>
